<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memórias — Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F0F5EC; font-family: Georgia, serif; }

  /* ── Section header ── */
  .section-header {
    text-align: center;
    padding: 60px 24px 40px;
  }
  .section-header h2 {
    font-size: 2.2rem;
    color: #2C2C1E;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }
  .section-header .divider {
    width: 60px;
    height: 2px;
    background: #C9A84C;
    margin: 14px auto 0;
  }

  /* ── Masonry grid ── */
  .masonry {
    columns: 4;
    column-gap: 8px;
    padding: 0 32px 60px;
    max-width: 1100px;
    margin: 0 auto;
  }
  @media (max-width: 900px) { .masonry { columns: 3; } }
  @media (max-width: 600px) { .masonry { columns: 2; } }

  .masonry-item {
    break-inside: avoid;
    margin-bottom: 8px;
    overflow: hidden;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }
  .masonry-item img {
    display: block;
    width: 100%;
    transition: transform 0.35s ease, filter 0.35s ease;
  }
  .masonry-item:hover img {
    transform: scale(1.04);
    filter: brightness(0.85);
  }
  .masonry-item .overlay {
    position: absolute;
    inset: 0;
    background: rgba(43,79,140,0.0);
    transition: background 0.3s ease;
    border-radius: 4px;
  }
  .masonry-item:hover .overlay {
    background: rgba(43,79,140,0.18);
  }

  /* ── Placeholder images with varied aspect ratios ── */
  .img-tall   { aspect-ratio: 3/4; }
  .img-wide   { aspect-ratio: 4/3; }
  .img-square { aspect-ratio: 1/1; }
  .img-port   { aspect-ratio: 2/3; }

  .placeholder-img {
    width: 100%;
    display: block;
  }

  /* ── Theater Modal ── */
  .theater-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,28,20,0.96);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .theater-close {
    position: absolute;
    top: 20px;
    right: 24px;
    color: rgba(255,255,255,0.7);
    font-size: 1.8rem;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
  }
  .theater-counter {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }
  .theater-main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 0;
    padding: 60px 0 12px;
    position: relative;
  }
  .theater-img-wrap {
    max-height: calc(100vh - 180px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .theater-img-wrap svg {
    max-height: calc(100vh - 180px);
    max-width: calc(100vw - 140px);
    border-radius: 4px;
  }
  .theater-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .theater-arrow:hover { background: rgba(255,255,255,0.18); }
  .theater-arrow.prev { left: 20px; }
  .theater-arrow.next { right: 20px; }

  /* Thumbnail strip */
  .theater-thumbs {
    display: flex;
    gap: 6px;
    padding: 12px 24px 20px;
    overflow-x: auto;
    justify-content: center;
    max-width: 100%;
  }
  .theater-thumb {
    width: 52px;
    height: 52px;
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }
  .theater-thumb.active {
    border-color: #C9A84C;
  }
  .theater-thumb svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* hide theater by default */
  .theater-overlay { display: none; }
  .theater-overlay.visible { display: flex; }

  /* demo controls */
  .demo-bar {
    background: #2C2C1E;
    color: #C9A84C;
    text-align: center;
    padding: 10px;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
  }
  .demo-btn {
    background: #C9A84C;
    color: #2C2C1E;
    border: none;
    padding: 6px 16px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: bold;
    margin-left: 12px;
  }
</style>
</head>
<body>

<div class="demo-bar">
  PREVIEW — Grid Masonry
  <button class="demo-btn" onclick="openTheater()">Ver Modo Teatro →</button>
</div>

<!-- ── Section ── -->
<div class="section-header">
  <h2>Memórias</h2>
  <div class="divider"></div>
</div>

<!-- ── Masonry Grid (placeholders com cores da paleta) ── -->
<div class="masonry">

  <!-- Col simulada com SVGs coloridos variando proporções -->
  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-tall" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="400" fill="#2B4F8C"/>
      <rect x="60" y="160" width="180" height="2" fill="rgba(255,255,255,0.2)"/>
      <circle cx="150" cy="120" r="40" fill="rgba(255,255,255,0.1)"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-wide" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="300" fill="#5A7A3A"/>
      <circle cx="200" cy="150" r="60" fill="rgba(255,255,255,0.08)"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-square" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="300" fill="#C9A84C"/>
      <rect x="80" y="80" width="140" height="140" fill="rgba(255,255,255,0.1)" rx="4"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-port" viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="450" fill="#1A3A6B"/>
      <circle cx="150" cy="180" r="70" fill="rgba(201,168,76,0.2)"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-wide" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="300" fill="#8FA85C"/>
      <rect x="100" y="100" width="200" height="100" fill="rgba(255,255,255,0.08)" rx="4"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-tall" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="400" fill="#2C2C1E"/>
      <circle cx="150" cy="200" r="80" fill="rgba(201,168,76,0.15)"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-square" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="300" fill="#2B4F8C"/>
      <rect x="50" y="50" width="200" height="200" fill="rgba(255,255,255,0.06)" rx="8"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-wide" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="300" fill="#5A7A3A"/>
      <circle cx="200" cy="150" r="50" fill="rgba(240,245,236,0.1)"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-port" viewBox="0 0 300 450" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="450" fill="#C9A84C"/>
      <rect x="60" y="150" width="180" height="180" fill="rgba(44,44,30,0.15)" rx="4"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-tall" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="400" fill="#1A3A6B"/>
      <circle cx="150" cy="160" r="55" fill="rgba(255,255,255,0.08)"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-square" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="300" fill="#8FA85C"/>
      <circle cx="150" cy="150" r="60" fill="rgba(255,255,255,0.08)"/>
    </svg>
    <div class="overlay"></div>
  </div>

  <div class="masonry-item" onclick="openTheater()">
    <svg class="placeholder-img img-wide" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="280" fill="#2C2C1E"/>
      <rect x="80" y="80" width="240" height="120" fill="rgba(201,168,76,0.12)" rx="4"/>
    </svg>
    <div class="overlay"></div>
  </div>

</div>

<!-- ── Theater Modal ── -->
<div class="theater-overlay" id="theater">
  <button class="theater-close" onclick="closeTheater()">✕</button>
  <div class="theater-counter">7 de 20</div>

  <div class="theater-main">
    <button class="theater-arrow prev">‹</button>
    <div class="theater-img-wrap">
      <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" style="max-height:calc(100vh - 180px);max-width:calc(100vw - 140px);border-radius:4px;">
        <rect width="800" height="600" fill="#2B4F8C"/>
        <circle cx="400" cy="280" r="140" fill="rgba(201,168,76,0.15)"/>
        <rect x="150" y="260" width="500" height="2" fill="rgba(255,255,255,0.1)"/>
        <text x="400" y="350" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="14" font-family="Georgia">foto expandida</text>
      </svg>
    </div>
    <button class="theater-arrow next">›</button>
  </div>

  <!-- Thumbnail strip -->
  <div class="theater-thumbs">
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#2B4F8C"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#5A7A3A"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#C9A84C"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#1A3A6B"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#8FA85C"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#2C2C1E"/></svg></div>
    <div class="theater-thumb active"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#2B4F8C"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#5A7A3A"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#C9A84C"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#1A3A6B"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#8FA85C"/></svg></div>
    <div class="theater-thumb"><svg viewBox="0 0 52 52"><rect width="52" height="52" fill="#2B4F8C"/></svg></div>
  </div>
</div>

<script>
  function openTheater() {
    document.getElementById('theater').classList.add('visible');
    document.body.style.overflow = 'hidden';
  }
  function closeTheater() {
    document.getElementById('theater').classList.remove('visible');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeTheater();
  });
</script>
</body>
</html>
